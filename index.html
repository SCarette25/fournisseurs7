<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSource Aero - Sourcing & Pilotage</title>
    
    <!-- CHARGEMENT DES LIBRAIRIES -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Leaflet (Carte) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
        .leaflet-container { width: 100%; height: 100%; border-radius: 0.75rem; z-index: 0; background: #eef2f6; }
        .custom-marker-container { display: flex; align-items: center; justify-content: center; }
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .leaflet-popup-content { margin: 0; width: 280px !important; }
        /* Masquer les flèches des inputs nombre */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // ============================================================================
        // CONNEXION À LA BASE DE DONNÉES GOOGLE SHEETS
        // ============================================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfE9H1H2-PqUuQk7yK8kR_hL-b5W-k4h9l1t9pI8c_G2w7a6R0vX8z9Y2_s/exec";
        
        const syncWithSheet = async (action, sheetName, data) => {
            try {
                console.log(`Envoi ordre à Google Sheets : ${action} sur ${sheetName}`);
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, sheet: sheetName, data })
                });
                const result = await response.json();
                console.log("Réponse de Google Sheets:", result);
                return result;
            } catch (error) {
                console.error("Erreur de communication avec Google Sheets:", error);
                return { status: 'error', message: error.message };
            }
        };

        const getBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // --- ICONS (SVG Inline pour éviter les crashs de librairies externes) ---
        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                Mail: <g><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></g>,
                MapPin: <g><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></g>,
                Filter: <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>,
                CheckCircle: <g><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></g>,
                AlertCircle: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></g>,
                Search: <g><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></g>,
                Send: <g><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></g>,
                Box: <g><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></g>,
                Layout: <g><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></g>,
                Users: <g><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></g>,
                Activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>,
                Lock: <g><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></g>,
                Unlock: <g><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></g>,
                Clock: <g><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></g>,
                Zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
                Info: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></g>,
                X: <g><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></g>,
                ImageIcon: <g><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></g>,
                Wrench: <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>,
                Trophy: <g><path d="M8 21h8m-4-9v9m-4.8-9a4 4 0 0 1 0-8h9.6a4 4 0 0 1 0 8s-3.2 2-4.8 2-4.8-2-4.8-2zM2 9h2m16 0h2"/><path d="M4 9a2 2 0 0 0 2 2m12-2a2 2 0 0 1-2 2"/></g>,
                Paperclip: <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>,
                BarChart3: <g><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></g>,
                History: <g><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></g>,
                Star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
                Camera: <g><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></g>,
                Check: <polyline points="20 6 9 17 4 12"/>,
                LogOut: <g><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></g>,
                UserCheck: <g><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></g>,
                Trash2: <g><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></g>,
                Calendar: <g><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></g>,
                Plus: <g><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></g>,
                Edit: <g><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></g>
            };

            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10"/>}
                </svg>
            );
        };

        // --- CONSTANTES ---
        const MEAULTE_COORDS = { lat: 49.983, lng: 2.663 }; 
        const AIRBUS_SITES = [
            { name: "Airbus Toulouse", lat: 43.6293, lng: 1.3640 },
            { name: "Airbus Nantes", lat: 47.1731, lng: -1.6113 },
            { name: "Airbus Saint-Nazaire", lat: 47.2878, lng: -2.1702 },
            { name: "Airbus Méaulte", lat: 49.9833, lng: 2.6633 }
        ];

        const calculateDistance = (lat1, lon1, lat2, lon2) => {
            if(!lat1 || !lon1 || !lat2 || !lon2) return 9999;
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        };

        const FILTERS = [
            { id: 'Outils volants / Grille de perçage', label: 'Outils volants / Grille', icon: 'Box' },
            { id: 'Outillage moyen /Moyen levage', label: 'Outillage moyen / Levage', icon: 'Box' },
            { id: 'Gros outils /Mécano_soudure', label: 'Gros Outillage / Mécano', icon: 'Layout' },
            { id: 'Modification / Maintenance', label: 'Modification / Maintenance', icon: 'Wrench' },
        ];

        const TOOLING_TYPES = ['Gros outils /Mécano_soudure', 'Outillage moyen /Moyen levage', 'Outils volants / Grille de perçage', 'Système automatisé'];
        const ALL_AVAILABLE_TAGS = ['Gros outils /Mécano_soudure', 'Outillage moyen /Moyen levage', 'Outils volants / Grille de perçage', 'Système automatisé', 'capacité BE', 'réalisation en interne', 'Mesure laser en interne', 'Précision'];

        // --- COMPOSANT CARTE ---
        const MapComponent = ({ suppliers, selectedIds, onSelect, showZone }) => {
            useEffect(() => {
                const container = document.getElementById('map-container');
                if(!container || !window.L) return;
                
                if (container._leaflet_map) {
                    container._leaflet_map.remove();
                    container._leaflet_map = null;
                }

                const map = L.map('map-container').setView([46.603354, 1.888334], 6);
                container._leaflet_map = map;

                L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap France',
                    maxZoom: 20
                }).addTo(map);

                AIRBUS_SITES.forEach(site => {
                    const airbusIcon = L.divIcon({
                        className: 'custom-airbus-marker',
                        html: `<div style="background-color: #00205b; width: 24px; height: 24px; border-radius: 50%; border: 2px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.3);"></div>`,
                        iconSize: [24, 24], iconAnchor: [12, 12]
                    });
                    L.marker([site.lat, site.lng], { icon: airbusIcon, zIndexOffset: 1000 }).addTo(map).bindPopup(`<b>${site.name}</b>`);
                });

                if (showZone) {
                    L.circle([MEAULTE_COORDS.lat, MEAULTE_COORDS.lng], { color: '#f97316', fillColor: '#f97316', fillOpacity: 0.1, radius: 15000 }).addTo(map);
                }

                suppliers.forEach(s => {
                    const isSelected = selectedIds.includes(s.id);
                    let color = s.status === 'available' ? '#22c55e' : '#f97316';
                    const icon = L.divIcon({
                        className: 'custom-marker',
                        html: `<div style="width: ${isSelected ? '24px' : '16px'}; height: ${isSelected ? '24px' : '16px'}; background-color: ${color}; border: 2px solid white; border-radius: 50%; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s;"></div>`,
                        iconSize: [24, 24], iconAnchor: [12, 12]
                    });
                    const marker = L.marker([s.lat, s.lng], { icon }).addTo(map);
                    marker.bindPopup(`<div style="text-align:center; font-family:sans-serif;"><b>${s.name}</b><br/><span style="color:#666">${s.city}</span></div>`);
                    marker.on('click', () => onSelect(s.id));
                });
            }, [suppliers, selectedIds, showZone]);

            return <div id="map-container" className="h-full w-full rounded-xl border border-slate-200 shadow-inner z-0"></div>;
        };

        const StatusBadge = ({ status }) => (
            <span className={`px-2 py-0.5 rounded text-[10px] font-black border flex items-center gap-1 ${status === 'available' ? 'bg-green-100 text-green-700 border-green-200' : 'bg-orange-100 text-orange-700 border-orange-200'}`}>
                <Icon name={status === 'available' ? "CheckCircle" : "Activity"} size={10}/> {status === 'available' ? "Disponible" : "Chargé"}
            </span>
        );

        // --- ECRAN DE CONNEXION ---
        const LoginScreen = ({ onLogin }) => {
            const USERS = ['Thomas L.', 'Julie M.', 'Marc D.', 'Sarah B.'];
            const [selectedUser, setSelectedUser] = useState(USERS[0]);

            return (
                <div className="fixed inset-0 bg-gradient-to-br from-slate-900 to-blue-900 z-[100] flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 animate-fade-in text-center">
                        <div className="w-20 h-20 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-6 shadow-lg shadow-blue-500/30">
                            <Icon name="Box" size={40} className="text-white" />
                        </div>
                        <h1 className="text-2xl font-black text-slate-800 mb-2">SmartSource Aero</h1>
                        <p className="text-slate-500 text-sm mb-8 font-medium">Sourcing Sécurisé</p>
                        
                        <div className="text-left mb-6">
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Profil</label>
                            <select value={selectedUser} onChange={(e) => setSelectedUser(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl py-4 pl-4 pr-8 font-bold outline-none">
                                {USERS.map(u => <option key={u} value={u}>{u}</option>)}
                            </select>
                        </div>

                        <button onClick={() => onLogin(selectedUser)} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                            Accéder à l'espace <Icon name="CheckCircle" size={16}/>
                        </button>
                    </div>
                </div>
            );
        };

        // --- APP PRINCIPALE ---
        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            
            // Données
            const [suppliers, setSuppliers] = useState([]);
            const [projects, setProjects] = useState([]);
            const [isLoadingData, setIsLoadingData] = useState(false);
            const [isOffline, setIsOffline] = useState(false);
            
            // UI State
            const [notification, setNotification] = useState(null);
            const [viewMode, setViewMode] = useState('list');
            const [selectedTags, setSelectedTags] = useState([]);
            const [urgentMode, setUrgentMode] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedSuppliers, setSelectedSuppliers] = useState([]);
            
            // Modales
            const [showMailModal, setShowMailModal] = useState(false);
            const [showFeedbackModal, setShowFeedbackModal] = useState(false);
            const [detailSupplier, setDetailSupplier] = useState(null);
            
            // Admin
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [adminPin, setAdminPin] = useState('');
            const [adminError, setAdminError] = useState(false);
            const [showSupplierForm, setShowSupplierForm] = useState(false);
            const [editingSupplier, setEditingSupplier] = useState(null);
            
            const defaultSupplierForm = { name: '', city: '', address: '', lat: 43.6000, lng: 1.4333, contact: '', email: '', phone: '', tags: [], rating: 5.0, scores: { delais: 5, communication: 5, qualite: 5, satisfaction: 5 }, status: 'available', images: [] };
            const [formData, setFormData] = useState(defaultSupplierForm);

            const [attachedFile, setAttachedFile] = useState(null);
            const [newConsultation, setNewConsultation] = useState({ name: '', program: 'A320 SA', date: '', message: 'Bonjour...' });
            const [feedback, setFeedback] = useState({ projectId: null, supplierId: '', scores: { delais: 5, communication: 5, qualite: 5, satisfaction: 5 }, photo: null });

            const AIRCRAFT_PROGRAMS = ['A320 SA', 'A350 XWB', 'LR', 'MA'];

            // LECTURE DONNEES
            useEffect(() => {
                if(!currentUser) return;
                const fetchSheetData = async () => {
                    setIsLoadingData(true);
                    try {
                        const resSup = await fetch(SCRIPT_URL + "?sheet=Fournisseurs");
                        const textSup = await resSup.text();
                        if (textSup.startsWith("<")) throw new Error("Blocage Google (CORS/Auth)");
                        
                        const jsonSup = JSON.parse(textSup);
                        if(jsonSup.status === 'success' && jsonSup.data) {
                            setSuppliers(jsonSup.data.map(s => ({
                                ...s,
                                lat: parseFloat(s.lat) || 0, lng: parseFloat(s.lng) || 0,
                                tags: s.tags ? s.tags.split(',').map(t=>t.trim()) : [],
                                status: s.status || 'available',
                                rating: parseFloat(s.rating) || 5,
                                scores: {
                                    delais: parseFloat(s.score_delais) || 5,
                                    communication: parseFloat(s.score_communication) || 5,
                                    qualite: parseFloat(s.score_qualite) || 5,
                                    satisfaction: parseFloat(s.score_satisfaction) || 5
                                },
                                images: s.images ? s.images.split(',').map(i=>i.trim()).filter(i=>i) : []
                            })));
                            setIsOffline(false);
                        }

                        const resProj = await fetch(SCRIPT_URL + "?sheet=Projets");
                        if (resProj.ok) {
                            const textProj = await resProj.text();
                            if (!textProj.startsWith("<")) {
                                const jsonProj = JSON.parse(textProj);
                                if(jsonProj.status === 'success' && jsonProj.data) {
                                    setProjects(jsonProj.data.map(p => {
                                        let parsedSuppliers = [];
                                        try { parsedSuppliers = JSON.parse(p.consultedSuppliers); } catch(e) {}
                                        return { ...p, consultedSuppliers: parsedSuppliers };
                                    }).sort((a,b) => new Date(b.date) - new Date(a.date)));
                                }
                            }
                        }
                    } catch (error) {
                        console.warn("Passage en mode hors ligne", error);
                        setIsOffline(true);
                        showNotificationMsg("⚠️ Serveur indisponible (Mode Local)");
                    } finally {
                        setIsLoadingData(false);
                    }
                };
                fetchSheetData();
            }, [currentUser]);

            // FILTRAGE ROBUSTE
            const filteredSuppliers = useMemo(() => {
                let result = [...suppliers];
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    result = result.filter(s => 
                        (s.name && s.name.toLowerCase().includes(q)) || 
                        (s.city && s.city.toLowerCase().includes(q)) ||
                        (s.tags && s.tags.some(t => t.toLowerCase().includes(q)))
                    );
                }
                if (selectedTags.length > 0) {
                    if (selectedTags.includes('Modification / Maintenance')) {
                        result = result.filter(s => calculateDistance(MEAULTE_COORDS.lat, MEAULTE_COORDS.lng, s.lat, s.lng) < 15);
                    } else {
                        result = result.filter(s => s.tags && selectedTags.every(tag => s.tags.includes(tag)));
                    }
                }
                if (urgentMode) {
                    result = result.filter(s => s.tags && s.tags.includes('capacité BE') && s.tags.includes('réalisation en interne') && s.tags.some(t => t.includes('Mesure')));
                }
                result.sort((a, b) => (b.status === 'available' ? 2 : 1) - (a.status === 'available' ? 2 : 1) || b.rating - a.rating);
                return result;
            }, [selectedTags, suppliers, urgentMode, searchQuery]);

            // HANDLERS
            const showNotificationMsg = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 3000); };
            const toggleTag = (tag) => tag === 'Modification / Maintenance' ? setSelectedTags(selectedTags.includes(tag) ? [] : [tag]) : setSelectedTags(selectedTags.includes(tag) ? selectedTags.filter(t => t !== tag) : [...selectedTags.filter(t => t !== 'Modification / Maintenance'), tag]);
            const toggleSupplierSelection = (id) => !isAdminMode && setSelectedSuppliers(prev => prev.includes(id) ? prev.filter(s => s !== id) : [...prev, id]);
            const handleAdminLogin = () => { if (adminPin === "1234") { setIsAdminMode(true); setShowAdminLogin(false); setAdminError(false); setAdminPin(''); } else setAdminError(true); };

            // SAUVEGARDE FOURNISSEUR (ANTI-CRASH)
            const saveSupplier = async () => {
                if (!formData.name || !formData.city) return alert("Le nom et la ville sont obligatoires.");
                try {
                    // Toujours forcer l'existence d'un tableau tags pour éviter les crashs au filtrage
                    const tagsSafe = Array.isArray(formData.tags) ? formData.tags : [];
                    
                    if (editingSupplier) {
                        const updatedSup = { ...editingSupplier, ...formData, tags: tagsSafe };
                        setSuppliers(prev => prev.map(s => s.id === editingSupplier.id ? updatedSup : s));
                        showNotificationMsg("Fournisseur mis à jour.");
                        if(!isOffline) await syncWithSheet("update", "Fournisseurs", { ...updatedSup, tags: tagsSafe.join(',') });
                    } else {
                        const newSup = { 
                            ...formData, 
                            id: 'F' + Date.now(), 
                            rating: 5, status: 'available', 
                            scores: {delais:5, communication:5, qualite:5, satisfaction:5}, 
                            images: [], 
                            tags: tagsSafe 
                        };
                        setSuppliers([newSup, ...suppliers]);
                        showNotificationMsg("Fournisseur ajouté.");
                        if(!isOffline) await syncWithSheet("add", "Fournisseurs", { ...newSup, tags: tagsSafe.join(',') });
                    }
                    setShowSupplierForm(false);
                } catch (e) {
                    console.error(e);
                    alert("Erreur lors de la sauvegarde.");
                }
            };

            const handleDeleteSupplier = async (id) => {
                if(window.confirm("Supprimer ce fournisseur ?")) {
                    setSuppliers(prev => prev.filter(s => s.id !== id));
                    setShowSupplierForm(false);
                    if(!isOffline) await syncWithSheet("delete", "Fournisseurs", { id: id });
                }
            };

            if (!currentUser) return <LoginScreen onLogin={setCurrentUser} />;

            return (
                <div className="flex h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden">
                    {/* NOTIFICATION */}
                    {notification && (
                        <div className="fixed bottom-6 right-6 bg-slate-900 text-white px-6 py-4 rounded-xl shadow-2xl z-[100] flex items-center gap-3">
                            <Icon name={notification.includes("⚠️") ? "AlertCircle" : "CheckCircle"} className={notification.includes("⚠️") ? "text-orange-400" : "text-green-400"} />
                            <span className="font-bold text-sm">{notification}</span>
                        </div>
                    )}

                    {/* SIDEBAR */}
                    <div className="w-80 bg-white border-r border-slate-200 flex flex-col shadow-xl z-20">
                        <div className="p-6 border-b border-slate-100 bg-gradient-to-br from-slate-800 to-slate-900 text-white">
                            <div className="flex items-center gap-2 font-bold text-xl"><div className="bg-blue-600 p-1.5 rounded-lg"><Icon name="Box" size={20} className="text-white"/></div>SmartSource</div>
                            <div className="mt-2 flex items-center justify-between">
                                <span className="text-[10px] text-blue-200 uppercase font-bold tracking-widest">{currentUser}</span>
                                <button onClick={() => setCurrentUser(null)} className="text-[10px] bg-white/10 hover:bg-white/20 px-2 py-1 rounded flex items-center gap-1"><Icon name="LogOut" size={10}/> Sortir</button>
                            </div>
                        </div>

                        <div className="p-6 flex-1 overflow-y-auto">
                            <div className="mb-8 flex flex-col gap-1">
                                <button onClick={() => setViewMode('list')} className={`flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold ${viewMode === 'map' || viewMode === 'list' ? 'bg-blue-50 text-blue-700' : 'text-slate-500 hover:bg-slate-50'}`}><Icon name="Search" size={18}/> Sourcing</button>
                                <button onClick={() => setViewMode('history')} className={`flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold ${viewMode === 'history' ? 'bg-blue-50 text-blue-700' : 'text-slate-500 hover:bg-slate-50'}`}><Icon name="History" size={18}/> Journal</button>
                            </div>

                            {(viewMode === 'map' || viewMode === 'list') && (
                                <React.Fragment>
                                    <div className="mb-6 relative">
                                        <input type="text" placeholder="Nom, ville, tag..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-slate-100 rounded-xl py-2.5 pl-10 pr-4 text-sm font-medium outline-none"/>
                                        <div className="absolute left-3 top-3 text-slate-400"><Icon name="Search" size={16}/></div>
                                    </div>
                                    <div className="mb-6">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Icon name="Filter" size={12} /> Types</h3>
                                        <div className="space-y-2">
                                            {FILTERS.map(filter => (
                                                <button key={filter.id} onClick={() => toggleTag(filter.id)} className={`w-full text-left px-3 py-2.5 rounded-xl text-sm font-bold flex items-center gap-3 border ${selectedTags.includes(filter.id) ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-white hover:bg-slate-50 text-slate-600 border-slate-100'}`}>
                                                    <span className={selectedTags.includes(filter.id) ? 'text-blue-500' : 'text-slate-400'}><Icon name={filter.icon} size={16}/></span>
                                                    {filter.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </React.Fragment>
                            )}
                        </div>
                        
                        <div className="p-4 border-t border-slate-100 bg-slate-50 flex flex-col gap-2">
                            <button onClick={() => isAdminMode ? setIsAdminMode(false) : setShowAdminLogin(true)} className={`w-full p-2 rounded-xl text-xs font-bold flex items-center justify-center gap-2 ${isAdminMode ? 'bg-slate-800 text-white' : 'bg-white border border-slate-200 text-slate-400 hover:bg-slate-100'}`}>
                                <Icon name={isAdminMode ? "Unlock" : "Lock"} size={12} /> {isAdminMode ? 'Mode Admin ACTIF' : 'Accès Admin'}
                            </button>
                        </div>
                    </div>

                    {/* MAIN CONTENT AREA */}
                    <div className="flex-1 flex flex-col overflow-hidden relative bg-white">
                        <div className="h-16 border-b border-slate-100 flex items-center justify-between px-8 bg-white/80 z-10 sticky top-0">
                            <h2 className="text-lg font-black text-slate-800 uppercase tracking-tighter flex items-center gap-3">
                                {viewMode === 'list' ? 'Sourcing Actif' : 'Journal'}
                                {isOffline && <span className="text-[10px] bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full">Hors Ligne</span>}
                            </h2>
                        </div>

                        <div className="flex-1 p-6 overflow-hidden relative bg-slate-50">
                            {/* VUE LISTE */}
                            {viewMode === 'list' && (
                                <div className="h-full overflow-y-auto pb-20">
                                    {isAdminMode && (
                                        <div className="mb-6 flex justify-end">
                                            <button onClick={() => { setEditingSupplier(null); setFormData(defaultSupplierForm); setShowSupplierForm(true); }} className="bg-slate-800 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 shadow-lg">
                                                <Icon name="Plus" size={16}/> Ajouter un fournisseur
                                            </button>
                                        </div>
                                    )}
                                    <div className="grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-3 gap-6">
                                        {filteredSuppliers.map(s => (
                                            <div key={s.id} onClick={() => !isAdminMode && toggleSupplierSelection(s.id)} className={`bg-white rounded-2xl p-5 border shadow-sm ${!isAdminMode && selectedSuppliers.includes(s.id) ? 'border-blue-500 bg-blue-50/10' : 'border-slate-200'}`}>
                                                <div className="flex justify-between items-start mb-4">
                                                    <div>
                                                        <h3 className="font-black text-lg text-slate-900 leading-tight">{s.name}</h3>
                                                        <div className="flex items-center text-slate-500 text-[11px] font-bold mt-1 uppercase"><Icon name="MapPin" size={12} className="mr-1 text-blue-500" /> {s.city}</div>
                                                    </div>
                                                    <StatusBadge status={s.status} />
                                                </div>
                                                <div className="flex items-center justify-between pt-4 border-t border-slate-100 mt-auto">
                                                    <div className="flex flex-col">
                                                        <span className="text-[10px] text-slate-400 uppercase font-black">Contact</span>
                                                        <div className="text-xs font-semibold text-slate-700 flex items-center gap-1.5"><Icon name="Users" size={12} className="text-blue-400"/> {s.contact || 'N/A'}</div>
                                                    </div>
                                                    {isAdminMode ? (
                                                        <button onClick={(e) => { e.stopPropagation(); setEditingSupplier(s); setFormData({...s, tags: s.tags || []}); setShowSupplierForm(true); }} className="bg-slate-100 text-slate-700 px-4 py-1.5 rounded-lg text-[11px] font-black uppercase flex items-center gap-1">
                                                            <Icon name="Edit" size={12}/> Éditer
                                                        </button>
                                                    ) : (
                                                        <button onClick={(e) => { e.stopPropagation(); setDetailSupplier(s); }} className="text-blue-600 text-xs font-bold underline">Fiche détaillée</button>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* VUE JOURNAL (Simplifiée pour l'exemple) */}
                            {viewMode === 'history' && (
                                <div className="text-center py-20 text-slate-400">Le journal s'affichera ici.</div>
                            )}
                        </div>
                    </div>

                    {/* MODALS */}
                    {showAdminLogin && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[70] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-sm p-6 text-center">
                                <h3 className="text-lg font-black text-slate-800 uppercase mb-4">Accès Admin</h3>
                                <input type="password" placeholder="Code PIN (1234)" maxLength={4} value={adminPin} onChange={e => setAdminPin(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAdminLogin()} className="w-full bg-slate-50 border rounded-xl p-3 text-center font-black text-lg outline-none mb-4"/>
                                <div className="flex gap-3"><button onClick={() => setShowAdminLogin(false)} className="flex-1 px-4 py-3 bg-slate-100 rounded-xl font-bold">Annuler</button><button onClick={handleAdminLogin} className="flex-1 px-4 py-3 bg-slate-800 text-white rounded-xl font-bold">Valider</button></div>
                            </div>
                        </div>
                    )}

                    {/* MODAL FORMULAIRE FOURNISSEUR */}
                    {showSupplierForm && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[80] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-6 bg-slate-900 text-white flex justify-between">
                                    <h3 className="text-xl font-bold">{editingSupplier ? "Modifier le fournisseur" : "Nouveau fournisseur"}</h3>
                                    <button onClick={() => setShowSupplierForm(false)}><Icon name="X" size={24}/></button>
                                </div>
                                <div className="p-8 overflow-y-auto bg-slate-50/50">
                                    <div className="grid grid-cols-2 gap-6 mb-6">
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase block mb-1">Nom *</label><input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm" /></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase block mb-1">Ville *</label><input type="text" value={formData.city} onChange={e => setFormData({...formData, city: e.target.value})} className="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm" /></div>
                                    </div>
                                    <div className="mb-6">
                                        <label className="text-[10px] font-black text-slate-400 uppercase block mb-3">Tags & Compétences</label>
                                        <div className="flex flex-wrap gap-2">
                                            {ALL_AVAILABLE_TAGS.map(tag => (
                                                <button key={tag} onClick={() => setFormData(prev => ({...prev, tags: (prev.tags || []).includes(tag) ? prev.tags.filter(t => t !== tag) : [...(prev.tags || []), tag]}))} className={`px-3 py-1.5 text-xs font-bold rounded-lg border ${ (formData.tags || []).includes(tag) ? 'bg-blue-600 text-white' : 'bg-white'}`}>
                                                    {tag}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="p-6 bg-white flex justify-between items-center border-t">
                                    {editingSupplier ? <button onClick={() => handleDeleteSupplier(editingSupplier.id)} className="text-red-500 text-xs font-bold flex items-center gap-1"><Icon name="Trash2" size={14}/> Supprimer</button> : <div/>}
                                    <div className="flex gap-3">
                                        <button onClick={() => setShowSupplierForm(false)} className="px-6 py-2.5 text-slate-500 font-black uppercase text-xs hover:bg-slate-100 rounded-xl">Annuler</button>
                                        <button onClick={saveSupplier} className="px-8 py-2.5 bg-slate-900 text-white font-black uppercase text-xs rounded-xl">Enregistrer</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* MODAL DETAIL */}
                    {detailSupplier && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[60] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-xl overflow-hidden">
                                <div className="p-6 bg-slate-900 text-white flex justify-between">
                                    <h2 className="text-2xl font-black">{detailSupplier.name}</h2>
                                    <button onClick={() => setDetailSupplier(null)}><Icon name="X" size={24}/></button>
                                </div>
                                <div className="p-8">
                                    <div className="flex flex-wrap gap-2 mb-6">
                                        {(detailSupplier.tags || []).map(tag => <span key={tag} className="px-3 py-1 text-xs font-bold rounded bg-slate-100 border border-slate-200">{tag}</span>)}
                                    </div>
                                    <p className="text-sm"><strong>Contact :</strong> {detailSupplier.contact}</p>
                                    <p className="text-sm"><strong>Email :</strong> {detailSupplier.email}</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
