            if (!isSheetAvailable) return;
            try {
                // Requête standard, mais on s'attend à ce qu'elle puisse échouer à cause du CORS 
                // si le script n'est pas correctement configuré pour accepter les requêtes cross-origin.
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, sheet: sheetName, data })

        const calculateDistance = (lat1, lon1, lat2, lon2) => {
            if(!lat1 || !lon1 || !lat2 || !lon2) return 9999;
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            
            // Données
            const [suppliers, setSuppliers] = useState([]);
            const [projects, setProjects] = useState([]);
            const [isLoadingData, setIsLoadingData] = useState(false);
            
            // UI State
            const [notification, setNotification] = useState(null);
            const [viewMode, setViewMode] = useState('map');
            const [selectedTags, setSelectedTags] = useState([]);
            const [urgentMode, setUrgentMode] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedSuppliers, setSelectedSuppliers] = useState([]);
            
            // Modales
            const [showMailModal, setShowMailModal] = useState(false);
            const [showFeedbackModal, setShowFeedbackModal] = useState(false);
            const [detailSupplier, setDetailSupplier] = useState(null);
            
            // Admin
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [adminPin, setAdminPin] = useState('');
            const [adminError, setAdminError] = useState(false);
            const [showSupplierForm, setShowSupplierForm] = useState(false);
            const [editingSupplier, setEditingSupplier] = useState(null);
            
            const defaultSupplierForm = { name: '', city: '', address: '', lat: 43.6000, lng: 1.4333, contact: '', email: '', phone: '', tags: [], rating: 5.0, scores: { delais: 5, communication: 5, qualite: 5, satisfaction: 5 }, status: 'available', images: [] };
            const [formData, setFormData] = useState(defaultSupplierForm);

            // Temporaire Formulaires
            const [attachedFile, setAttachedFile] = useState(null);
            const [newConsultation, setNewConsultation] = useState({ name: '', program: 'A320 SA', date: '', message: 'Bonjour,\n\nVeuillez trouver ci-joint le cahier des charges pour notre besoin en outillage.\n\nMerci de nous faire un retour au plus vite.' });
            const [feedback, setFeedback] = useState({ projectId: null, supplierId: '', scores: { delais: 5, communication: 5, qualite: 5, satisfaction: 5 }, photo: null });

            const AIRCRAFT_PROGRAMS = ['A320 SA', 'A350 XWB', 'LR', 'MA'];

            // --- LECTURE GOOGLE SHEETS ---
            useEffect(() => {
                const fetchSheetData = async () => {
                    setIsLoadingData(true);
                    try {
                        // Tentative de lecture classique. C'est ici que l'erreur CORS se produit si Google bloque.
                        const resSup = await fetch(SCRIPT_URL + "?sheet=Fournisseurs");
                        
                        if (!resSup.ok) throw new Error("Erreur HTTP: " + resSup.status);
                        
                        const textSup = await resSup.text();
                        if (textSup.startsWith("<!DOCTYPE html>") || textSup.includes("<html")) {
                            throw new Error("Google a bloqué l'accès (Page de connexion). Problème de permissions.");
                        }

                        const jsonSup = JSON.parse(textSup);
                        if(jsonSup.status === 'success' && jsonSup.data && jsonSup.data.length > 0) {
                            const parsedSups = jsonSup.data.map(s => ({
                                id: s.id, name: s.name, city: s.city, address: s.address, contact: s.contact, email: s.email, phone: s.phone,
                                lat: parseFloat(s.lat) || 0, lng: parseFloat(s.lng) || 0,
                                tags: s.tags ? s.tags.split(',').map(t=>t.trim()) : [],
                                status: s.status || 'available',
                                rating: parseFloat(s.rating) || 5,
                                scores: {
                                    delais: parseFloat(s.score_delais) || 5,
                                    communication: parseFloat(s.score_communication) || 5,
                                    qualite: parseFloat(s.score_qualite) || 5,
                                    satisfaction: parseFloat(s.score_satisfaction) || 5
                                },
                                images: s.images ? s.images.split(',').map(i=>i.trim()) : []
                            }));
                            setSuppliers(parsedSups);
                        } else {
                            setSuppliers([]);
                        }

                        const resProj = await fetch(SCRIPT_URL + "?sheet=Projets");
                        if (resProj.ok) {
                            const textProj = await resProj.text();
                            if (!textProj.startsWith("<!DOCTYPE html>") && !textProj.includes("<html")) {
                                const jsonProj = JSON.parse(textProj);
                                if(jsonProj.status === 'success' && jsonProj.data) {
                                    const parsedProjs = jsonProj.data.map(p => {
                                        let parsedSuppliers = [];
                                        try { parsedSuppliers = JSON.parse(p.consultedSuppliers); } catch(e) {}
                                        return {
                                            id: p.id, name: p.name, program: p.program, date: p.date, charge: p.charge, status: p.status, selectedSupplierId: p.selectedSupplierId,
                                            consultedSuppliers: parsedSuppliers
                                        };
                                    });
                                    parsedProjs.sort((a,b) => new Date(b.date) - new Date(a.date));
                                    setProjects(parsedProjs);
                                }
                            }
                        } else {
                            setProjects([]);
                        }
                    } catch (error) {
                        // Capture de TOUTES les erreurs, y compris le blocage CORS fatal du navigateur
                        console.warn("Échec de la connexion à Google Sheets (CORS ou autre). Passage en mode données locales.", error);
                        // On ne bloque pas isSheetAvailable pour permettre d'éventuels POST no-cors
                        showNotificationMsg("Mode Hors-Ligne (Données Locales)");
                        setSuppliers(INITIAL_SUPPLIERS);
                        setProjects(INITIAL_PROJECTS);
                    } finally {
                        setIsLoadingData(false);
                    }
                };

                fetchSheetData();
            }, []);

            // --- FILTRAGE ---
            const filteredSuppliers = useMemo(() => {
                let result = [...suppliers];
                
                if (searchQuery) {
                    const queryLow = searchQuery.toLowerCase();
                    result = result.filter(s => 
                        s.name.toLowerCase().includes(queryLow) || 
                        s.city.toLowerCase().includes(queryLow) ||
                        s.tags.some(t => t.toLowerCase().includes(queryLow))
                    );
                }

                if (selectedTags.length > 0) {
                    if (selectedTags.includes('Modification / Maintenance')) {
                        result = result.filter(s => calculateDistance(MEAULTE_COORDS.lat, MEAULTE_COORDS.lng, s.lat, s.lng) < 15);
                    } else {
                        result = result.filter(s => selectedTags.every(tag => s.tags.includes(tag)));
                    }
                }
                if (urgentMode) {
                    result = result.filter(s => s.tags.includes('capacité BE') && s.tags.includes('réalisation en interne') && s.tags.some(t => t.includes('Mesure')));
                }
                result.sort((a, b) => {
                    const scoreA = a.status === 'available' ? 2 : 1;
                    const scoreB = b.status === 'available' ? 2 : 1;
                    if (scoreA !== scoreB) return scoreB - scoreA;
                    return b.rating - a.rating;
                });
                return result;
            }, [selectedTags, suppliers, urgentMode, searchQuery]);

            // --- HANDLERS UI ---
            const showNotificationMsg = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 3000); };
            const toggleTag = (tag) => tag === 'Modification / Maintenance' ? setSelectedTags(selectedTags.includes(tag) ? [] : [tag]) : setSelectedTags(selectedTags.includes(tag) ? selectedTags.filter(t => t !== tag) : [...selectedTags.filter(t => t !== 'Modification / Maintenance'), tag]);
            const toggleSupplierSelection = (id) => !isAdminMode && setSelectedSuppliers(prev => prev.includes(id) ? prev.filter(s => s !== id) : [...prev, id]);
            
            const handleAdminLogin = () => { 
                if (adminPin === "1234") { 
                    setIsAdminMode(true); setShowAdminLogin(false); setAdminError(false); setAdminPin(''); 
                } else { setAdminError(true); } 
            };

            // Helpers de formatage pour l'envoi à Google Sheets
            const formatSupForSheet = (sup) => ({
                id: sup.id, name: sup.name, city: sup.city, address: sup.address, contact: sup.contact, email: sup.email, phone: sup.phone,
                lat: sup.lat, lng: sup.lng, status: sup.status, rating: sup.rating,
                tags: Array.isArray(sup.tags) ? sup.tags.join(',') : '',
                score_delais: sup.scores?.delais, score_communication: sup.scores?.communication, score_qualite: sup.scores?.qualite, score_satisfaction: sup.scores?.satisfaction,
                images: Array.isArray(sup.images) ? sup.images.join(',') : ''
            });

            const formatProjForSheet = (proj) => ({
                id: proj.id, name: proj.name, program: proj.program, date: proj.date, charge: proj.charge, status: proj.status, selectedSupplierId: proj.selectedSupplierId || '',
                consultedSuppliers: JSON.stringify(proj.consultedSuppliers || [])
            });

            // --- ACTIONS DATA ---
            const updateSupplierStatus = async (id, newStatus) => {
                const sup = suppliers.find(s => s.id === id);
                if(sup) {
                    const updatedSup = { ...sup, status: newStatus };
                    setSuppliers(prev => prev.map(s => s.id === id ? updatedSup : s)); // UI update
                    await syncWithSheet("update", "Fournisseurs", formatSupForSheet(updatedSup)); // DB update
                }
            };
            
            const updateSupplierRating = async (id, newRating) => {
                const sup = suppliers.find(s => s.id === id);
                if(sup) {
                    const updatedSup = { ...sup, rating: parseFloat(newRating) };
                    setSuppliers(prev => prev.map(s => s.id === id ? updatedSup : s)); // UI update
                    await syncWithSheet("update", "Fournisseurs", formatSupForSheet(updatedSup)); // DB update
                }
            };

            const saveSupplier = async () => {
                if (!formData.name || !formData.city) return alert("Le nom et la ville sont obligatoires.");
                
                if (editingSupplier) {
                    const updatedSup = { ...editingSupplier, ...formData };
                    setSuppliers(prev => prev.map(s => s.id === editingSupplier.id ? updatedSup : s));
                    showNotificationMsg("Mise à jour effectuée.");
                    await syncWithSheet("update", "Fournisseurs", formatSupForSheet(updatedSup));
                } else {
                    const newSup = { ...formData, id: 'F' + Date.now(), rating: 5, status: 'available', scores: {delais:5, communication:5, qualite:5, satisfaction:5}, images:[] };
                    setSuppliers([newSup, ...suppliers]);
                    showNotificationMsg("Ajout effectué.");
                    await syncWithSheet("add", "Fournisseurs", formatSupForSheet(newSup));
                }
                setShowSupplierForm(false);
            };

            const handleDeleteSupplier = async (id) => {
                if(window.confirm("Êtes-vous sûr de vouloir supprimer définitivement ce fournisseur ?")) {
                    setSuppliers(prev => prev.filter(s => s.id !== id));
                    setShowSupplierForm(false);
                    showNotificationMsg("Suppression effectuée.");
                    await syncWithSheet("delete", "Fournisseurs", { id: id });
                }
            };

            const handleFileChange = (e) => e.target.files && setAttachedFile(e.target.files[0]);

            const handleSendMail = async (clientType) => {
                const recipients = selectedSuppliers.map(id => suppliers.find(s => s.id === id));
                const emailList = recipients.map(s => s.email).filter(e => e).join(',');
                const subject = encodeURIComponent(`Consultation Outillage : ${newConsultation.name || 'Projet'} (${newConsultation.program})`);
                const body = encodeURIComponent(`${newConsultation.message}\n\nCordialement,\n${currentUser}`);
                
                if (clientType === 'gmail') {
                    window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${emailList}&su=${subject}&body=${body}`, '_blank');
                } else if (clientType === 'default') {
                    window.location.href = `mailto:${emailList}?subject=${subject}&body=${body}`;
                }

                const newProject = {
                    id: 'P' + Date.now(),
                    name: newConsultation.name || 'Projet Sans Nom',
                    program: newConsultation.program,
                    date: new Date().toISOString().split('T')[0],
                    charge: currentUser,
                    status: 'Consultation en cours',
                    consultedSuppliers: recipients.map(s => ({ id: s.id, name: s.name, status: 'En attente' })),
                    selectedSupplierId: null
                };
                
                setProjects([newProject, ...projects]);
                setShowMailModal(false);
                setSelectedSuppliers([]);
                setAttachedFile(null);
                setNewConsultation({ name: '', program: 'A320 SA', date: '', message: 'Bonjour...' });
                showNotificationMsg("Projet enregistré !");
                
                await syncWithSheet("add", "Projets", formatProjForSheet(newProject));
            };

            const selectSupplierForProject = async (projectId, supplierId) => {
                const projectToUpdate = projects.find(p => p.id === projectId);
                if(!projectToUpdate) return;

                const updatedConsulted = projectToUpdate.consultedSuppliers.map(s => ({
                    ...s, status: s.id === supplierId ? 'Retenu' : 'Non retenu'
                }));

                const updatedProj = {
                    ...projectToUpdate,
                    selectedSupplierId: supplierId,
                    status: 'En Réalisation',
                    consultedSuppliers: updatedConsulted
                };

                setProjects(prev => prev.map(p => p.id === projectId ? updatedProj : p));
                showNotificationMsg("Sélection enregistrée !");
                await syncWithSheet("update", "Projets", formatProjForSheet(updatedProj));
            };

            const cancelProject = async (projectId) => {
                if(window.confirm("Êtes-vous sûr de vouloir annuler ce projet ?")) {
                    const proj = projects.find(p => p.id === projectId);
                    const updatedProj = { ...proj, status: 'Annulé' };
                    setProjects(prev => prev.map(p => p.id === projectId ? updatedProj : p));
                    await syncWithSheet("update", "Projets", formatProjForSheet(updatedProj));
                }
            };

            const submitFeedback = async () => {
                const sup = suppliers.find(s => s.id === feedback.supplierId);
                if (!sup) return;

                const newScores = {
                    delais: (sup.scores.delais + feedback.scores.delais) / 2,
                    communication: (sup.scores.communication + feedback.scores.communication) / 2,
                    qualite: (sup.scores.qualite + feedback.scores.qualite) / 2,
                    satisfaction: (sup.scores.satisfaction + feedback.scores.satisfaction) / 2,
                };
                const newGlobalRating = parseFloat(((newScores.delais + newScores.communication + newScores.qualite + newScores.satisfaction) / 4).toFixed(1));

                // 1. Mise à jour de l'UI immédiate
                const updatedSup = { ...sup, rating: newGlobalRating, scores: newScores, images: feedback.photo ? [...sup.images, URL.createObjectURL(feedback.photo)] : sup.images };
                setSuppliers(prev => prev.map(s => s.id === feedback.supplierId ? updatedSup : s));
                
                let updatedProj = null;
                if (feedback.projectId) {
                    updatedProj = { ...projects.find(p => p.id === feedback.projectId), status: 'Terminé' };
                    setProjects(prev => prev.map(p => p.id === feedback.projectId ? updatedProj : p));
                }
                setShowFeedbackModal(false);
                showNotificationMsg("Projet clôturé ! Enregistrement en cours...");

                // 2. Traitement Image et envoi base de données
                let dataToSend = formatSupForSheet(updatedSup);
                if (feedback.photo) {
                    dataToSend.photoBase64 = await getBase64(feedback.photo);
                }

                await syncWithSheet("update", "Fournisseurs", dataToSend);
                if (updatedProj) await syncWithSheet("update", "Projets", formatProjForSheet(updatedProj));
            };

            const openFeedbackForProject = (project) => {
                if (project.charge !== currentUser) {
                    alert(`Action refusée. Seul ${project.charge} peut modifier ce dossier.`);
                    return;
                }
                setFeedback({
                    projectId: project.id,
                    supplierId: project.selectedSupplierId,
                    scores: { delais: 5, communication: 5, qualite: 5, satisfaction: 5 },
                    photo: null
                });
                setShowFeedbackModal(true);
            };

            const pendingCount = projects.filter(p => p.status === 'En Réalisation' && p.charge === currentUser).length;

            if (!currentUser) return <LoginScreen onLogin={setCurrentUser} />;

            return (
                <div className="flex h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden">
                    {/* NOTIFICATION TOAST */}
                    {notification && (
                        <div className="fixed bottom-6 right-6 bg-slate-900 text-white px-6 py-4 rounded-xl shadow-2xl z-[100] animate-fade-in flex items-center gap-3">
                            <Icon name={notification.includes("⚠️") ? "AlertCircle" : "CheckCircle"} className={notification.includes("⚠️") ? "text-orange-400" : "text-green-400"} />
                            <span className="font-bold text-sm">{notification}</span>
                        </div>
                    )}

                    {/* SIDEBAR */}
                    <div className="w-80 bg-white border-r border-slate-200 flex flex-col shadow-xl z-20">
                        <div className="p-6 border-b border-slate-100 bg-gradient-to-br from-slate-800 to-slate-900 text-white">
                            <div className="flex items-center gap-2 font-bold text-xl"><div className="bg-blue-600 p-1.5 rounded-lg"><Icon name="Box" size={20} className="text-white"/></div>SmartSource</div>
                            <div className="mt-2 flex items-center justify-between">
                                <span className="text-[10px] text-blue-200 uppercase font-bold tracking-widest">{currentUser}</span>
                                <button onClick={() => setCurrentUser(null)} className="text-[10px] bg-white/10 hover:bg-white/20 px-2 py-1 rounded text-white flex items-center gap-1"><Icon name="LogOut" size={10}/> Sortir</button>
                            </div>
                        </div>

                        <div className="p-6 flex-1 overflow-y-auto">
                            <div className="mb-8 flex flex-col gap-1">
                                <button onClick={() => setViewMode('map')} className={`flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold transition-all ${viewMode === 'map' || viewMode === 'list' ? 'bg-blue-50 text-blue-700 border border-blue-100' : 'text-slate-500 hover:bg-slate-50'}`}><Icon name="Search" size={18}/> Sourcing</button>
                                <button onClick={() => setViewMode('history')} className={`flex items-center justify-between px-3 py-2.5 rounded-xl text-sm font-bold transition-all ${viewMode === 'history' ? 'bg-blue-50 text-blue-700 border border-blue-100' : 'text-slate-500 hover:bg-slate-50'}`}>
                                    <div className="flex items-center gap-3"><Icon name="History" size={18}/> Journal</div>
                                    {pendingCount > 0 && <span className="bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full animate-pulse">{pendingCount}</span>}
                                </button>
                                <button onClick={() => setViewMode('stats')} className={`flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold transition-all ${viewMode === 'stats' ? 'bg-blue-50 text-blue-700 border border-blue-100' : 'text-slate-500 hover:bg-slate-50'}`}><Icon name="BarChart3" size={18}/> Statistiques</button>
                            </div>

                            {(viewMode === 'map' || viewMode === 'list') && (
                                <React.Fragment>
                                    <div className="h-px bg-slate-100 mb-6 mx-2"/>
                                    
                                    {/* RECHERCHE GLOBALE */}
                                    <div className="mb-6">
                                        <div className="relative">
                                            <input 
                                                type="text" 
                                                placeholder="Nom, ville, tag..." 
                                                value={searchQuery}
                                                onChange={(e) => setSearchQuery(e.target.value)}
                                                className="w-full bg-slate-100 border border-transparent focus:border-blue-500 focus:bg-white rounded-xl py-2.5 pl-10 pr-4 text-sm font-medium outline-none transition-all"
                                            />
                                            <div className="absolute left-3 top-3 text-slate-400"><Icon name="Search" size={16} /></div>
                                        </div>
                                    </div>

                                    <div className="mb-8 p-4 bg-orange-50 rounded-xl border border-orange-100">
                                        <h3 className="text-[10px] font-black text-orange-800 uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="Clock" size={12} /> Contraintes</h3>
                                        <div className="flex items-center justify-between"><span className="text-sm font-bold text-slate-700 flex items-center gap-2"><Icon name="Zap" size={16} className={urgentMode ? "text-orange-500 fill-orange-500" : "text-slate-400"}/> Urgence / Délais</span><button onClick={() => setUrgentMode(!urgentMode)} className={`w-10 h-5 rounded-full p-1 transition-colors ${urgentMode ? 'bg-orange-500' : 'bg-slate-300'}`}><div className={`w-3 h-3 bg-white rounded-full transform transition-transform ${urgentMode ? 'translate-x-5' : 'translate-x-0'}`}></div></button></div>
                                    </div>
                                    <div className="mb-6">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Icon name="Filter" size={12} /> Types</h3>
                                        <div className="space-y-2">
                                            {FILTERS.map(filter => (
                                                <button key={filter.id} onClick={() => toggleTag(filter.id)} className={`w-full text-left px-3 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center gap-3 border ${selectedTags.includes(filter.id) ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-white hover:bg-slate-50 text-slate-600 border-slate-100'}`}>
                                                    <span className={selectedTags.includes(filter.id) ? 'text-blue-500' : 'text-slate-400'}><Icon name={filter.icon} size={16}/></span>
                                                    {filter.label}
                                                    {selectedTags.includes(filter.id) && <Icon name="CheckCircle" size={14} className="ml-auto text-blue-500"/>}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </React.Fragment>
                            )}
                        </div>
                        
                        {/* BOTTOM ADMIN BUTTON */}
                        <div className="p-4 border-t border-slate-100 bg-slate-50 flex flex-col gap-2">
                            <button disabled={selectedSuppliers.length === 0} onClick={() => setShowMailModal(true)} className="w-full bg-blue-700 hover:bg-blue-800 disabled:bg-slate-300 text-white py-3 rounded-xl font-bold shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-2"><Icon name="Send" size={18} /> Consulter ({selectedSuppliers.length})</button>
                            <button onClick={() => isAdminMode ? setIsAdminMode(false) : setShowAdminLogin(true)} className={`w-full mt-2 p-2 rounded-xl transition-colors text-xs font-bold flex items-center justify-center gap-2 ${isAdminMode ? 'bg-slate-800 text-white' : 'bg-white border border-slate-200 text-slate-400 hover:bg-slate-100'}`}><Icon name={isAdminMode ? "Unlock" : "Lock"} size={12} /> {isAdminMode ? 'Mode Admin ACTIF' : 'Accès Admin'}</button>
                        </div>
                    </div>

                    {/* MAIN CONTENT AREA */}
                    <div className="flex-1 flex flex-col overflow-hidden relative bg-white">
                        <div className="h-16 border-b border-slate-100 flex items-center justify-between px-8 bg-white/80 backdrop-blur-md z-10 sticky top-0">
                            <h2 className="text-lg font-black text-slate-800 uppercase tracking-tighter flex items-center gap-3">
                                {viewMode === 'map' || viewMode === 'list' ? 'Sourcing Actif' : viewMode === 'history' ? 'Journal de Projets' : 'Statistiques'}
                                {isLoadingData && <span className="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold animate-pulse flex items-center gap-1"><Icon name="Activity" size={10} /> Chargement...</span>}
                            </h2>
                            {(viewMode === 'map' || viewMode === 'list') && (<div className="flex bg-slate-100 p-1 rounded-xl border border-slate-200"><button onClick={() => setViewMode('list')} className={`px-4 py-1.5 rounded-lg text-xs font-black uppercase transition-all ${viewMode === 'list' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>Liste</button><button onClick={() => setViewMode('map')} className={`px-4 py-1.5 rounded-lg text-xs font-black uppercase transition-all ${viewMode === 'map' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>Carte</button></div>)}
                        </div>

                        <div className="flex-1 p-6 overflow-hidden relative bg-slate-50">
                            {/* VUE LISTE */}
                            {viewMode === 'list' && (
                                <div className="h-full overflow-y-auto pb-20">
                                    {isAdminMode && (
                                        <div className="mb-6 flex justify-end">
                                            <button onClick={() => { setEditingSupplier(null); setFormData(defaultSupplierForm); setShowSupplierForm(true); }} className="bg-slate-800 hover:bg-slate-900 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 shadow-lg transition-all transform active:scale-95">
                                                <Icon name="Plus" size={16}/> Ajouter un fournisseur
                                            </button>
                                        </div>
                                    )}
                                    {suppliers.length === 0 && !isLoadingData ? (
                                        <div className="text-center py-20 text-slate-400 font-medium">Aucun fournisseur trouvé.</div>
                                    ) : (
                                        <div className="grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-3 gap-6">
                                            {filteredSuppliers.map((s, index) => (
                                                <div key={s.id} onClick={() => !isAdminMode && toggleSupplierSelection(s.id)} className={`bg-white rounded-2xl p-5 border transition-all relative group shadow-sm hover:shadow-md ${!isAdminMode && selectedSuppliers.includes(s.id) ? 'border-blue-500 ring-1 ring-blue-500 bg-blue-50/10' : 'border-slate-200'} ${isAdminMode ? 'border-dashed border-slate-300' : 'cursor-pointer'}`}>

                        <div className="fixed inset-0 bg-slate-900/60 z-[60] flex items-center justify-center backdrop-blur-sm p-4">
                             <div className="bg-white rounded-3xl shadow-2xl w-full max-w-xl overflow-hidden flex flex-col max-h-[90vh] animate-fade-in">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-900 text-white">
                                    <h3 className="text-xl font-black mb-0 flex items-center gap-2"><Icon name="Star" className="text-yellow-400 fill-yellow-400" /> Notation Projet</h3>
                                    <button onClick={() => setShowFeedbackModal(false)} className="text-slate-400 hover:text-white transition-colors"><Icon name="X" size={24} /></button>
                                </div>
                                <div className="p-8 overflow-y-auto">
                                    <div className="space-y-4">
                                        {/* Titre Projet */}
                                        {feedback.projectId && (
                                            <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 text-blue-900 text-center">
                                                <div className="text-[10px] uppercase font-black tracking-widest text-blue-400 mb-1">PROJET À CLÔTURER</div>
                                                <div className="font-bold text-lg">{projects.find(p => p.id === feedback.projectId)?.name}</div>
                                            </div>
                                        )}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            {['delais', 'communication', 'qualite', 'satisfaction'].map(key => (
                                                <div key={key}>
                                                    <label className="text-[10px] font-black text-slate-400 uppercase block mb-4">{key.toUpperCase()}</label>
                                                    <div className="flex items-center gap-4">
                                                        <input type="range" min="1" max="5" step="1" className="flex-1 accent-blue-600" value={feedback.scores[key]} onChange={e => setFeedback({...feedback, scores: {...feedback.scores, [key]: parseInt(e.target.value)}})} />
                                                        <span className="text-lg font-black text-blue-700 w-6 text-right">{feedback.scores[key]}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="border-2 border-dashed rounded-xl p-8 text-center cursor-pointer hover:bg-slate-50 transition-colors">
                                            <input type="file" className="hidden" onChange={e => setFeedback({...feedback, photo: e.target.files[0]})}/>
                                            <Icon name="Camera" size={32} className="mx-auto text-slate-400 mb-2"/>
                                            <span className="text-xs font-bold text-slate-500 uppercase">Ajouter Photo</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-6 border-t border-slate-100 bg-white flex justify-end gap-3">
                                    <button onClick={() => setShowFeedbackModal(false)} className="px-6 py-2.5 text-slate-500 font-black uppercase text-xs hover:bg-slate-100 rounded-xl transition-colors">Annuler</button>
                                    <button onClick={submitFeedback} className="w-full bg-blue-700 hover:bg-blue-800 transition-colors text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200">Enregistrer & Clôturer</button>
                                </div>
                             </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
